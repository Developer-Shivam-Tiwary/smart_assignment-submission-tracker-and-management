                                                    className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                                >
                                                    <option value="">-- Select Class --</option>
                                                    {classes.map(c => (
                                                        <option key={c.classId} value={c.classId}>
                                                            {c.className} ({c.section})
                                                        </option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                    )}

                                    {editingUser && (
                                        <div className="flex items-center space-x-2 pt-2">
                                            <input
                                                type="checkbox"
                                                id="isActive"
                                                checked={isActive}
                                                onChange={(e) => setIsActive(e.target.checked)}
                                                className="h-4 w-4 bg-slate-950 border border-slate-800 rounded text-indigo-600 focus:ring-indigo-500"
                                            />
                                            <label for="isActive" className="text-sm font-semibold text-slate-300">Account Active</label>
                                        </div>
                                    )}

                                    <div className="flex justify-end space-x-3 pt-4 border-t border-slate-900 mt-6">
                                        <button
                                            type="button"
                                            onClick={() => setShowModal(false)}
                                            className="py-2 px-4 bg-slate-900 hover:bg-slate-800 border border-slate-800 text-xs font-bold rounded-lg transition-colors text-slate-400 hover:text-slate-200"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            type="submit"
                                            className="py-2 px-4 text-xs font-bold text-white rounded-lg btn-gradient"
                                        >
                                            {editingUser ? "Save Profile" : "Register"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // =========================================================================
        // TEACHER DASHBOARD
        // =========================================================================
        function TeacherDashboard({ apiCall, setView, setCurrentAssignmentId, showAlert }) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [editingAssignment, setEditingAssignment] = useState(null);

            // Form inputs
            const [title, setTitle] = useState("");
            const [description, setDescription] = useState("");
            const [classId, setClassId] = useState("");
            const [deadline, setDeadline] = useState("");
            const [maxMarks, setMaxMarks] = useState(100);
            const [status, setStatus] = useState("ACTIVE");
            const [fileData, setFileData] = useState({ name: "", base64: "" });

            useEffect(() => {
                loadDashboard();
            }, []);

            const loadDashboard = async () => {
                try {
                    const res = await apiCall("/teacher/dashboard");
                    setData(res);
                } catch (e) {
                    showAlert(e.message, "error");
                } finally {
                    setLoading(false);
                }
            };

            const resetForm = () => {
                setTitle("");
                setDescription("");
                setClassId("");
                setDeadline("");
                setMaxMarks(100);
                setStatus("ACTIVE");
                setFileData({ name: "", base64: "" });
                setEditingAssignment(null);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    setFileData({
                        name: file.name,
                        base64: reader.result
                    });
                };
                reader.readAsDataURL(file);
            };

            const handleCreateOrUpdate = async (e) => {
                e.preventDefault();
                try {
                    const payload = {
                        title,
                        description,
                        classId: parseInt(classId),
                        deadline,
                        maxMarks: parseInt(maxMarks),
                        status
                    };

                    if (fileData.name && fileData.base64) {
                        payload.fileName = fileData.name;
                        payload.fileBase64 = fileData.base64;
                    }

                    if (editingAssignment) {
                        payload.assignmentId = editingAssignment.assignmentId;
                        await apiCall("/teacher/assignments", "PUT", payload);
                        showAlert("Assignment updated successfully!");
                    } else {
                        await apiCall("/teacher/assignments", "POST", payload);
                        showAlert("Assignment published successfully!");
                    }
                    setShowModal(false);
                    resetForm();
                    loadDashboard();
                } catch (err) {
                    showAlert(err.message, "error");
                }
            };

            const handleEdit = (a) => {
                setEditingAssignment(a);
                setTitle(a.title);
                setDescription(a.description || "");
                setClassId(a.classId.toString());
                
                // Format deadline for datetime-local input
                // DB date is "yyyy-MM-dd HH:mm:ss" or standard iso, need "yyyy-MM-ddTHH:mm"
                let dl = "";
                if (a.deadline) {
                    const d = new Date(a.deadline);
                    const pad = (n) => n.toString().padStart(2, '0');
                    dl = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
                }
                setDeadline(dl);
                setMaxMarks(a.maxMarks);
                setStatus(a.status);
                setFileData({ name: "", base64: "" });
                setShowModal(true);
            };

            const handleDelete = async (assignmentId) => {
                if (!confirm("Are you sure you want to delete this assignment and all submissions made to it? This action is irreversible.")) {
                    return;
                }
                try {
                    await apiCall(`/teacher/assignments?id=${assignmentId}`, "DELETE");
                    showAlert("Assignment deleted successfully!");
                    loadDashboard();
                } catch (err) {
                    showAlert(err.message, "error");
                }
            };

            const handleExtend = async (a) => {
                const newDl = prompt("Enter new extended deadline (Format: YYYY-MM-DD HH:MM)\nMust be after initial deadline:", a.deadline ? a.deadline.substring(0, 16) : "");
                if (newDl === null) return;
                
                // Convert simple prompt datetime to format backend expects (yyyy-MM-dd'T'HH:mm)
                const formattedDl = newDl.replace(" ", "T");
                try {
                    await apiCall("/teacher/assignments", "PUT", {
                        assignmentId: a.assignmentId,
                        title: a.title,
                        description: a.description,
                        classId: a.classId,
                        deadline: formattedDl,
                        maxMarks: a.maxMarks,
                        status: a.status
                    });
                    showAlert("Deadline extended successfully!");
                    loadDashboard();
                } catch (err) {
                    showAlert(err.message, "error");
                }
            };

            const viewSubmissions = (assignmentId) => {
                setCurrentAssignmentId(assignmentId);
                setView("submissions");
            };

            if (loading) return <Loader />;

            const statsList = data?.assignmentsStats || [];
            const assignedClasses = data?.assignedClasses || [];

            return (
                <div className="space-y-6">
                    {/* Header */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-4 sm:space-y-0">
                        <div>
                            <h1 className="text-3xl font-extrabold font-display tracking-tight text-slate-100 font-display">Teacher Portal</h1>
                            <p className="text-slate-400 mt-1">Publish assignments, track student submissions, and grade work.</p>
                        </div>
                        <button
                            onClick={() => { resetForm(); setShowModal(true); }}
                            className="py-2.5 px-4 text-xs font-bold text-white rounded-lg btn-gradient flex items-center"
                        >
                            <i className="fa-solid fa-file-circle-plus mr-1.5"></i> Publish Assignment
                        </button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-1 gap-5 sm:grid-cols-3">
                        <StatCard icon="fa-school text-indigo-400" title="Assigned Classes" value={data?.assignedClassesCount} bg="from-indigo-500/10 to-indigo-500/5 border-indigo-500/20" />
                        <StatCard icon="fa-file-signature text-purple-400" title="Total Assignments" value={data?.totalAssignmentsCount} bg="from-purple-500/10 to-purple-500/5 border-purple-500/20" />
                        <StatCard icon="fa-envelope-open-text text-pink-400" title="Submissions Received" value={data?.totalSubmissionsCount} bg="from-pink-500/10 to-pink-500/5 border-pink-500/20" />
                    </div>

                    {/* Classroom Cards Summary */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {assignedClasses.map(c => {
                            // Find assignments of this class
                            const classAssignments = statsList.filter(s => s.assignment.classId === c.classId);
                            const pendingGradingCount = classAssignments.reduce((acc, curr) => acc + curr.pendingGrading, 0);

                            return (
                                <div key={c.classId} className="glass-panel p-5 rounded-xl border border-slate-900 space-y-4 bg-slate-950/20">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h3 className="text-lg font-bold font-display text-slate-200">{c.className}</h3>
                                            <p className="text-xs text-slate-500">Section: {c.section} | Year: {c.academicYear}</p>
                                        </div>
                                        {pendingGradingCount > 0 && (
                                            <span className="px-2 py-0.5 bg-red-950 text-red-400 border border-red-900 rounded text-[10px] font-bold animate-pulse">
                                                {pendingGradingCount} Pending Grade
                                            </span>
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 text-center border-t border-slate-900 pt-3">
                                        <div>
                                            <span className="block text-[10px] uppercase font-bold text-slate-500">Assignments</span>
                                            <span className="text-lg font-bold text-slate-300">{classAssignments.length}</span>
                                        </div>
                                        <div>
                                            <span className="block text-[10px] uppercase font-bold text-slate-500">Submissions</span>
                                            <span className="text-lg font-bold text-slate-300">
                                                {classAssignments.reduce((acc, curr) => acc + curr.submissionCount, 0)}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Assignment Stats List */}
                    <div className="glass-panel rounded-xl overflow-hidden shadow-xl border border-slate-900">
                        <div className="px-6 py-4 bg-slate-950/30 border-b border-slate-900 font-bold font-display text-slate-200">
                            Assignments list & Submissions Status
                        </div>
                        <div className="divide-y divide-slate-900">
                            {statsList.length > 0 ? (
                                statsList.map((stat) => {
                                    const a = stat.assignment;
                                    const submissionRate = stat.totalStudents > 0 
                                        ? Math.round((stat.submissionCount / stat.totalStudents) * 100) 
                                        : 0;

                                    return (
                                        <div key={a.assignmentId} className="p-6 hover:bg-slate-900/10 transition-colors flex flex-col md:flex-row md:items-center justify-between gap-4">
                                            <div className="space-y-1 md:max-w-md">
                                                <div className="flex items-center space-x-2">
                                                    <span className="px-1.5 py-0.5 bg-slate-900 border border-slate-800 text-[10px] font-bold text-indigo-400 rounded">
                                                        {stat.className}
                                                    </span>
                                                    <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${
                                                        a.status === 'ACTIVE' ? 'bg-green-950 text-green-400 border border-green-900' : 'bg-slate-900 text-slate-500 border border-slate-800'
                                                    }`}>
                                                        {a.status}
                                                    </span>
                                                </div>
                                                <h3 className="text-lg font-bold text-slate-200">{a.title}</h3>
                                                <p className="text-xs text-slate-400 line-clamp-1">{a.description || "No description provided."}</p>
                                                <div className="text-xs text-slate-500 flex items-center space-x-3 pt-1">
                                                    <span><i className="fa-solid fa-calendar mr-1"></i> Due: {a.deadline ? a.deadline.replace("T", " ").substring(0, 16) : "-"}</span>
                                                    <span><i className="fa-solid fa-clipboard mr-1"></i> Marks: {a.maxMarks}</span>
                                                </div>
                                            </div>

                                            {/* Submission Progress bar */}
                                            <div className="flex items-center space-x-8">
                                                <div className="w-40 space-y-1">
                                                    <div className="flex justify-between text-xs font-semibold">
                                                        <span className="text-slate-400">Submissions</span>
                                                        <span className="text-slate-300">{stat.submissionCount}/{stat.totalStudents} ({submissionRate}%)</span>
                                                    </div>
                                                    <div className="w-full bg-slate-900 rounded-full h-2 overflow-hidden border border-slate-800">
                                                        <div className="bg-gradient-to-r from-indigo-500 to-purple-500 h-full rounded-full" style={{ width: `${submissionRate}%` }}></div>
                                                    </div>
                                                    {stat.pendingGrading > 0 && (
                                                        <div className="text-[10px] font-bold text-amber-500 flex items-center">
                                                            <i className="fa-solid fa-circle-exclamation mr-1"></i> {stat.pendingGrading} pending evaluation
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="flex space-x-1">
                                                    <button onClick={() => viewSubmissions(a.assignmentId)} className="py-2 px-3 bg-indigo-600 hover:bg-indigo-500 text-xs font-bold text-white rounded-lg transition-colors flex items-center">
                                                        <i className="fa-solid fa-eye mr-1"></i> Submissions
                                                    </button>
                                                    <button onClick={() => handleEdit(a)} title="Edit Assignment" className="p-2 bg-slate-900 text-slate-400 hover:text-slate-200 hover:bg-slate-800 border border-slate-800 rounded-lg transition-colors">
                                                        <i className="fa-solid fa-pencil text-xs"></i>
                                                    </button>
                                                    <button onClick={() => handleExtend(a)} title="Extend Deadline" className="p-2 bg-slate-900 text-slate-400 hover:text-slate-200 hover:bg-slate-800 border border-slate-800 rounded-lg transition-colors">
                                                        <i className="fa-solid fa-calendar-plus text-xs"></i>
                                                    </button>
                                                    <button onClick={() => handleDelete(a.assignmentId)} title="Delete" className="p-2 bg-slate-900 text-red-400 hover:text-red-300 hover:bg-slate-800 border border-slate-800 rounded-lg transition-colors">
                                                        <i className="fa-solid fa-trash text-xs"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })
                            ) : (
                                <div className="p-8 text-center text-slate-500">No assignments created yet. Click "Publish Assignment" to start.</div>
                            )}
                        </div>
                    </div>

                    {/* Assignment Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                            <div className="glass-panel w-full max-w-lg rounded-xl shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
                                <div className="px-6 py-5 border-b border-slate-900 flex justify-between items-center bg-slate-950/30">
                                    <h3 className="text-lg font-bold font-display text-slate-200">
                                        {editingAssignment ? "Edit Assignment" : "Publish Assignment"}
                                    </h3>
                                    <button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-slate-200">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <form onSubmit={handleCreateOrUpdate} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Assignment Title</label>
                                        <input
                                            type="text"
                                            required
                                            value={title}
                                            onChange={(e) => setTitle(e.target.value)}
                                            placeholder="e.g. OS Memory Management Lab"
                                            className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Instructions / Description</label>
                                        <textarea
                                            value={description}
                                            onChange={(e) => setDescription(e.target.value)}
                                            rows="4"
                                            placeholder="Describe the homework details..."
                                            className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                        ></textarea>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Classroom Allocation</label>
                                            <select
                                                required
                                                value={classId}
                                                onChange={(e) => setClassId(e.target.value)}
                                                className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                            >
                                                <option value="">-- Select Class --</option>
                                                {assignedClasses.map(c => (
                                                    <option key={c.classId} value={c.classId}>
                                                        {c.className} ({c.section})
                                                    </option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Submission Deadline</label>
                                            <input
                                                type="datetime-local"
                                                required
                                                value={deadline}
                                                onChange={(e) => setDeadline(e.target.value)}
                                                className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                            />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Maximum Marks</label>
                                            <input
                                                type="number"
                                                required
                                                min="1"
                                                max="1000"
                                                value={maxMarks}
                                                onChange={(e) => setMaxMarks(e.target.value)}
                                                className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Status</label>
                                            <select
                                                value={status}
                                                onChange={(e) => setStatus(e.target.value)}
                                                className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                            >
                                                <option value="ACTIVE">ACTIVE (Visible to students)</option>
                                                <option value="DRAFT">DRAFT (Hidden)</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Attachment File (PDF, DOCX, Images)</label>
                                        <input
                                            type="file"
                                            onChange={handleFileChange}
                                            className="mt-1 block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-slate-900 file:text-slate-300 file:cursor-pointer hover:file:bg-slate-800 cursor-pointer"
                                        />
                                        {fileData.name && (
                                            <span className="text-xs text-indigo-400 font-semibold block mt-1"><i className="fa-solid fa-paperclip mr-1"></i> Selected: {fileData.name}</span>
                                        )}
                                    </div>

                                    <div className="flex justify-end space-x-3 pt-4 border-t border-slate-900 mt-6">
                                        <button
                                            type="button"
                                            onClick={() => setShowModal(false)}
                                            className="py-2 px-4 bg-slate-900 hover:bg-slate-800 border border-slate-800 text-xs font-bold rounded-lg transition-colors text-slate-400 hover:text-slate-200"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            type="submit"
                                            className="py-2 px-4 text-xs font-bold text-white rounded-lg btn-gradient"
                                        >
                                            {editingAssignment ? "Save Changes" : "Publish"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // =========================================================================
        // TEACHER EVALUATE SUBMISSIONS LIST
        // =========================================================================
        function TeacherSubmissions({ apiCall, assignmentId, setView, showAlert, session }) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState("all");
            const [search, setSearch] = useState("");
            const [selectedSubmission, setSelectedSubmission] = useState(null);

            // Grading inputs
            const [marks, setMarks] = useState("");
            const [feedback, setFeedback] = useState("");

            useEffect(() => {
                loadSubmissions();
            }, [filter, search]);

            const loadSubmissions = async () => {
                setLoading(true);
                try {
                    const data = await apiCall(`/teacher/submissions?assignmentId=${assignmentId}&filter=${filter}&search=${encodeURIComponent(search)}`);
                    setData(data);
                } catch (e) {
                    showAlert(e.message, "error");
                } finally {
                    setLoading(false);
                }
            };

            const openGradingModal = (sub) => {
                setSelectedSubmission(sub);
                setMarks(sub.marks !== null ? sub.marks.toString() : "");
                setFeedback(sub.feedback || "");
            };

            const submitGrade = async (e) => {
                e.preventDefault();
                try {
                    await apiCall("/teacher/grade", "POST", {
                        submissionId: selectedSubmission.submissionId,
                        marks: marks,
                        feedback: feedback
                    });
                    showAlert("Submission graded and updated!");
                    setSelectedSubmission(null);
                    loadSubmissions();
                } catch (err) {
                    showAlert(err.message, "error");
                }
            };

            if (loading && !data) return <Loader />;

            const assignment = data?.assignment;
            const roster = data?.roster || [];

            return (
                <div className="space-y-6">
                    {/* Header */}
                    <div className="flex items-center space-x-3">
                        <button onClick={() => setView("dashboard")} className="p-2 text-slate-400 hover:text-slate-200 bg-slate-900 border border-slate-800 rounded-lg hover:border-slate-700 transition-colors">
                            <i className="fa-solid fa-arrow-left"></i>
                        </button>
                        <div>
                            <h1 className="text-3xl font-extrabold font-display text-slate-100 tracking-tight">Evaluate Work</h1>
                            <p className="text-slate-400 mt-1">Assignment: <span className="text-indigo-400 font-semibold">{assignment?.title}</span></p>
                        </div>
                    </div>

                    {/* Filters & Search */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-4 sm:space-y-0 bg-slate-950/20 p-4 rounded-xl border border-slate-900 glass-panel">
                        <div className="flex space-x-2">
                            {["all", "submitted", "missing"].map((f) => (
                                <button
                                    key={f}
                                    onClick={() => setFilter(f)}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all uppercase tracking-wider ${
                                        filter === f
                                            ? "bg-indigo-600/20 border-indigo-500 text-indigo-300"
                                            : "border-slate-800 bg-slate-950/50 text-slate-400 hover:border-slate-700"
                                    }`}
                                >
                                    {f}
                                </button>
                            ))}
                        </div>
                        <div className="relative w-full sm:w-64">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                                <i className="fa-solid fa-search text-xs"></i>
                            </div>
                            <input
                                type="text"
                                placeholder="Search by name or roll number..."
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                className="w-full pl-8 pr-3 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none text-xs"
                            />
                        </div>
                    </div>

                    {/* submissions list */}
                    <div className="glass-panel rounded-xl overflow-hidden shadow-xl border border-slate-900">
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-slate-900 text-left text-sm">
                                <thead className="bg-slate-950/50 text-[10px] font-bold uppercase tracking-wider text-slate-500">
                                    <tr>
                                        <th className="px-6 py-4">Student</th>
                                        <th className="px-6 py-4">File Name</th>
                                        <th className="px-6 py-4">Submitted At</th>
                                        <th className="px-6 py-4 text-center">Attempts</th>
                                        <th className="px-6 py-4">Status</th>
                                        <th className="px-6 py-4">Marks</th>
                                        <th className="px-6 py-4 text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-900 bg-slate-950/10">
                                    {roster.length > 0 ? (
                                        roster.map((row) => {
                                            const s = row.student;
                                            const sub = row.submission;

                                            return (
                                                <tr key={s.studentId} className="hover:bg-slate-900/30 transition-colors">
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-slate-200">{s.fullName}</div>
                                                        <div className="text-xs text-slate-500">Roll: {s.rollNumber}</div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        {sub ? (
                                                            <a
                                                                href={`${API_URL}/download?id=${sub.submissionId}&type=submission&token=${session.token}`}
                                                                target="_blank"
                                                                title="Download Submission"
                                                                className="text-indigo-400 hover:text-indigo-300 font-semibold flex items-center hover:underline truncate max-w-[200px]"
                                                            >
                                                                <i className="fa-solid fa-file-arrow-down mr-1.5"></i> {sub.fileName}
                                                            </a>
                                                        ) : (
                                                            <span className="text-xs text-slate-600">-</span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        {sub ? (
                                                            <div className="text-xs text-slate-400">
                                                                {sub.submittedAt ? sub.submittedAt.replace("T", " ").substring(0, 16) : ""}
                                                            </div>
                                                        ) : (
                                                            <span className="text-xs text-slate-600">-</span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 text-center text-slate-400 font-bold">
                                                        {sub ? sub.resubmitCount + 1 : 0}
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        {sub ? (
                                                            <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                                                                sub.status === 'LATE' ? 'bg-red-500/10 text-red-400 border border-red-500/20' : 'bg-green-500/10 text-green-400 border border-green-500/20'
                                                            }`}>
                                                                {sub.status}
                                                            </span>
                                                        ) : (
                                                            <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-slate-900 text-slate-500 border border-slate-800">
                                                                MISSING
                                                            </span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 font-bold">
                                                        {sub && sub.marks !== null ? (
                                                            <span className="text-green-400">{sub.marks} / {assignment?.maxMarks}</span>
                                                        ) : sub ? (
                                                            <span className="text-amber-500 text-xs flex items-center"><i className="fa-solid fa-circle-question mr-1"></i> Unevaluated</span>
                                                        ) : (
                                                            <span className="text-slate-600">-</span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 text-right">
                                                        {sub ? (
                                                            <button onClick={() => openGradingModal(sub)} className="py-1 px-3 border border-indigo-500/20 hover:border-indigo-500/50 bg-indigo-950/20 hover:bg-indigo-950/40 text-xs font-bold text-indigo-300 rounded-lg transition-colors">
                                                                Grade
                                                            </button>
                                                        ) : (
                                                            <span className="text-xs text-slate-600">-</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            );
                                        })
                                    ) : (
                                        <tr>
                                            <td colSpan="7" className="px-6 py-12 text-center text-slate-500 italic">No submissions match the current filters.</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Grading Modal */}
                    {selectedSubmission && (
                        <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                            <div className="glass-panel w-full max-w-md rounded-xl shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
                                <div className="px-6 py-5 border-b border-slate-900 flex justify-between items-center bg-slate-950/30">
                                    <h3 className="text-lg font-bold font-display text-slate-200">
                                        Grade Homework Submission
                                    </h3>
                                    <button onClick={() => setSelectedSubmission(null)} className="text-slate-400 hover:text-slate-200">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <form onSubmit={submitGrade} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Score Awarded (Max: {assignment?.maxMarks})</label>
                                        <input
                                            type="number"
                                            required
                                            min="0"
                                            max={assignment?.maxMarks}
                                            step="0.5"
                                            value={marks}
                                            onChange={(e) => setMarks(e.target.value)}
                                            placeholder="Enter marks"
                                            className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Feedback / Comments</label>
                                        <textarea
                                            value={feedback}
                                            onChange={(e) => setFeedback(e.target.value)}
                                            rows="4"
                                            placeholder="Add constructive comments for the student..."
                                            className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                        ></textarea>
                                    </div>
                                    <div className="flex justify-end space-x-3 pt-4 border-t border-slate-900 mt-6">
                                        <button
                                            type="button"
                                            onClick={() => setSelectedSubmission(null)}
                                            className="py-2 px-4 bg-slate-900 hover:bg-slate-800 border border-slate-800 text-xs font-bold rounded-lg transition-colors text-slate-400 hover:text-slate-200"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            type="submit"
                                            className="py-2 px-4 text-xs font-bold text-white rounded-lg btn-gradient"
                                        >
                                            Grade & Save
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // =========================================================================
        // STUDENT DASHBOARD
        // =========================================================================
        function StudentDashboard({ apiCall, showAlert, session }) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [selectedAssignmentStat, setSelectedAssignmentStat] = useState(null);
            const [fileData, setFileData] = useState({ name: "", base64: "" });
            const [submitting, setSubmitting] = useState(false);

            useEffect(() => {
                loadDashboard();
            }, []);

            const loadDashboard = async () => {
                try {
                    const res = await apiCall("/student/dashboard");
                    setData(res);
                } catch (e) {
                    showAlert(e.message, "error");
                } finally {
                    setLoading(false);
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    setFileData({
                        name: file.name,
                        base64: reader.result
                    });
                };
                reader.readAsDataURL(file);
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                if (!fileData.name || !fileData.base64) {
                    showAlert("Please select a file to submit.", "error");
                    return;
                }
                setSubmitting(true);
                try {
                    await apiCall("/student/submit", "POST", {
                        assignmentId: selectedAssignmentStat.assignment.assignmentId,
                        fileName: fileData.name,
                        fileBase64: fileData.base64
                    });
                    showAlert("Assignment submitted successfully!");
                    setSelectedAssignmentStat(null);
                    setFileData({ name: "", base64: "" });
                    loadDashboard();
                } catch (err) {
                    showAlert(err.message, "error");
                } finally {
                    setSubmitting(false);
                }
            };

            const openSubmitModal = (stat) => {
                setSelectedAssignmentStat(stat);
                setFileData({ name: "", base64: "" });
            };

            if (loading) return <Loader />;

            const statsList = data?.assignmentsStats || [];

            return (
                <div className="space-y-6">
                    {/* Header */}
                    <div>
                        <h1 className="text-3xl font-extrabold font-display tracking-tight text-slate-100 font-display">Student Workspace</h1>
                        <p className="text-slate-400 mt-1">Review assignments, check deadlines, submit homework, and view teacher feedback.</p>
                    </div>

                    {/* Stats Grid */}
                    <div className="grid grid-cols-1 gap-5 sm:grid-cols-4">
                        <StatCard icon="fa-clipboard text-indigo-400" title="Assigned Homework" value={data?.totalAssignmentsCount} bg="from-indigo-500/10 to-indigo-500/5 border-indigo-500/20" />
                        <StatCard icon="fa-circle-check text-green-400" title="Submitted Work" value={data?.submittedCount} bg="from-green-500/10 to-green-500/5 border-green-500/20" />
                        <StatCard icon="fa-hourglass-half text-amber-400" title="Pending Submissions" value={data?.pendingCount} bg="from-amber-500/10 to-amber-500/5 border-amber-500/20" />
                        <StatCard icon="fa-triangle-exclamation text-red-400" title="Missing Deadlines" value={data?.missingCount} bg="from-red-500/10 to-red-500/5 border-red-500/20" />
                    </div>

                    {/* Assignments List */}
                    <div className="glass-panel rounded-xl overflow-hidden shadow-xl border border-slate-900">
                        <div className="px-6 py-4 bg-slate-950/30 border-b border-slate-900 font-bold font-display text-slate-200">
                            Class Assignments
                        </div>
                        <div className="divide-y divide-slate-900">
                            {statsList.length > 0 ? (
                                statsList.map((stat) => {
                                    const a = stat.assignment;
                                    const sub = stat.submission;
                                    const status = stat.status; // SUBMITTED, LATE, MISSING, PENDING
                                    const isReupload = stat.isReuploadAllowed;

                                    return (
                                        <div key={a.assignmentId} className="p-6 hover:bg-slate-900/10 transition-colors flex flex-col md:flex-row md:items-center justify-between gap-6">
                                            <div className="space-y-2 md:max-w-xl">
                                                <div className="flex items-center space-x-2">
                                                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                                                        status === 'SUBMITTED' ? 'bg-green-950 text-green-400 border border-green-900' :
                                                        status === 'LATE' ? 'bg-amber-950 text-amber-400 border border-amber-900' :
                                                        status === 'MISSING' ? 'bg-red-950 text-red-400 border border-red-900' :
                                                        'bg-indigo-950 text-indigo-400 border border-indigo-900'
                                                    }`}>
                                                        {status}
                                                    </span>
                                                </div>
                                                <h3 className="text-xl font-bold text-slate-200">{a.title}</h3>
                                                <p className="text-xs text-slate-400 leading-relaxed">{a.description || "No description provided."}</p>
                                                
                                                {/* Attachment File */}
                                                {a.filePath && (
                                                    <div className="pt-1">
                                                        <a
                                                            href={`${API_URL}/download?id=${a.assignmentId}&type=assignment&token=${session.token}`}
                                                            target="_blank"
                                                            className="text-indigo-400 hover:text-indigo-300 text-xs font-semibold hover:underline inline-flex items-center"
                                                        >
                                                            <i className="fa-solid fa-paperclip mr-1.5"></i> Reference: {a.fileName}
                                                        </a>
                                                    </div>
                                                )}

                                                <div className="text-xs text-slate-500 flex flex-wrap gap-4 pt-1 border-t border-slate-900/40">
                                                    <span><i className="fa-solid fa-calendar mr-1"></i> Due: {a.deadline ? a.deadline.replace("T", " ").substring(0, 16) : "-"}</span>
                                                    <span><i className="fa-solid fa-clipboard mr-1"></i> Max Score: {a.maxMarks}</span>
                                                    {sub && sub.marks !== null && (
                                                        <span className="text-green-400 font-bold"><i className="fa-solid fa-star mr-1"></i> Graded: {sub.marks} / {a.maxMarks}</span>
                                                    )}
                                                </div>

                                                {sub && sub.feedback && (
                                                    <div className="text-xs bg-slate-950/60 p-3 rounded-lg border border-slate-900 mt-2">
                                                        <span className="block uppercase font-bold text-[10px] text-slate-500 mb-1"><i className="fa-solid fa-comment mr-1"></i> Teacher Feedback</span>
                                                        <p className="text-slate-300 font-medium">{sub.feedback}</p>
                                                    </div>
                                                )}
                                            </div>

                                            {/* Action Button */}
                                            <div className="flex-shrink-0">
                                                {!sub ? (
                                                    status === "MISSING" ? (
                                                        <span className="text-xs text-red-400 font-bold"><i className="fa-solid fa-circle-exclamation mr-1"></i> Submissions Closed</span>
                                                    ) : (
                                                        <button onClick={() => openSubmitModal(stat)} className="py-2 px-4 text-xs font-bold text-white rounded-lg btn-gradient flex items-center">
                                                            <i className="fa-solid fa-upload mr-1.5"></i> Submit Homework
                                                        </button>
                                                    )
                                                ) : (
                                                    <div className="text-right space-y-2">
                                                        <div className="text-xs text-slate-400">
                                                            Submitted: <span className="text-indigo-400 font-semibold">{sub.fileName}</span>
                                                        </div>
                                                        {isReupload ? (
                                                            <button onClick={() => openSubmitModal(stat)} className="py-1.5 px-3 border border-indigo-500/20 hover:border-indigo-500/40 bg-indigo-950/20 text-xs font-bold text-indigo-300 rounded-lg transition-colors">
                                                                <i className="fa-solid fa-arrows-rotate mr-1"></i> Re-submit file
                                                            </button>
                                                        ) : (
                                                            <span className="text-[10px] text-slate-500 block italic">Re-upload locked (30-min window passed)</span>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })
                            ) : (
                                <div className="p-8 text-center text-slate-500">No assignments have been published for your class yet.</div>
                            )}
                        </div>
                    </div>

                    {/* Submit Homework Modal */}
                    {selectedAssignmentStat && (
                        <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                            <div className="glass-panel w-full max-w-md rounded-xl shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
                                <div className="px-6 py-5 border-b border-slate-900 flex justify-between items-center bg-slate-950/30">
                                    <h3 className="text-lg font-bold font-display text-slate-200">
                                        {selectedAssignmentStat.submission ? "Re-upload Homework File" : "Submit Homework File"}
                                    </h3>
                                    <button onClick={() => setSelectedAssignmentStat(null)} className="text-slate-400 hover:text-slate-200">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <form onSubmit={handleUpload} className="p-6 space-y-4">
                                    <div className="text-xs text-slate-400 bg-slate-950/50 p-3 rounded border border-slate-900 space-y-1">
                                        <div>Assignment: <strong className="text-slate-200">{selectedAssignmentStat.assignment.title}</strong></div>
                                        <div>Max Marks: <strong className="text-slate-200">{selectedAssignmentStat.assignment.maxMarks}</strong></div>
                                        <div>Deadline: <strong className="text-slate-200">{selectedAssignmentStat.assignment.deadline ? selectedAssignmentStat.assignment.deadline.replace("T", " ").substring(0, 16) : ""}</strong></div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Select Document (PDF, DOCX, Images - Max 10MB)</label>
                                        <input
                                            type="file"
                                            required
                                            onChange={handleFileChange}
                                            className="mt-1.5 block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-slate-900 file:text-slate-300 file:cursor-pointer hover:file:bg-slate-800 cursor-pointer"
                                        />
                                        {fileData.name && (
                                            <span className="text-xs text-indigo-400 font-semibold block mt-2"><i className="fa-solid fa-paperclip mr-1"></i> File selected: {fileData.name}</span>
                                        )}
                                    </div>

                                    {selectedAssignmentStat.submission && (
                                        <p className="text-[10px] text-amber-500 font-semibold">
                                            <i className="fa-solid fa-triangle-exclamation mr-1"></i> Re-uploading will delete your previous submission.
                                        </p>
                                    )}

                                    <div className="flex justify-end space-x-3 pt-4 border-t border-slate-900 mt-6">
                                        <button
                                            type="button"
                                            onClick={() => setSelectedAssignmentStat(null)}
                                            className="py-2 px-4 bg-slate-900 hover:bg-slate-800 border border-slate-800 text-xs font-bold rounded-lg transition-colors text-slate-400 hover:text-slate-200"
                                        >
                                            Cancel
                                        </button>
                                        <button
                                            type="submit"
                                            disabled={submitting}
                                            className="py-2 px-4 text-xs font-bold text-white rounded-lg btn-gradient flex items-center"
                                        >
                                            {submitting ? (
                                                <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                            ) : null}
                                            {selectedAssignmentStat.submission ? "Re-upload File" : "Submit File"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // =========================================================================
        // CHANGE PASSWORD MODAL COMPONENT
        // =========================================================================
        function ChangePasswordModal({ apiCall, onClose, showAlert }) {
            const [oldPassword, setOldPassword] = useState("");
            const [newPassword, setNewPassword] = useState("");
            const [confirmPassword, setConfirmPassword] = useState("");
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (newPassword !== confirmPassword) {
                    showAlert("New password and confirmation do not match.", "error");
                    return;
                }
                setLoading(true);
                try {
                    await apiCall("/auth/change-password", "POST", {
                        oldPassword,
                        newPassword,
                        confirmPassword
                    });
                    showAlert("Password updated successfully!");
                    onClose();
                } catch (err) {
                    showAlert(err.message, "error");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                    <div className="glass-panel w-full max-w-sm rounded-xl shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
                        <div className="px-6 py-5 border-b border-slate-900 flex justify-between items-center bg-slate-950/30">
                            <h3 className="text-lg font-bold font-display text-slate-200">
                                Change Password
                            </h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-200">
                                <i className="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div>
                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Current Password</label>
                                <input
                                    type="password"
                                    required
                                    value={oldPassword}
                                    onChange={(e) => setOldPassword(e.target.value)}
                                    placeholder="Enter current password"
                                    className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">New Password</label>
                                <input
                                    type="password"
                                    required
                                    value={newPassword}
                                    onChange={(e) => setNewPassword(e.target.value)}
                                    placeholder="Min 8 characters (letters + digits)"
                                    className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-400">Confirm New Password</label>
                                <input
                                    type="password"
                                    required
                                    value={confirmPassword}
                                    onChange={(e) => setConfirmPassword(e.target.value)}
                                    placeholder="Re-enter new password"
                                    className="mt-1 block w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm"
                                />
                            </div>
                            <div className="flex justify-end space-x-3 pt-4 border-t border-slate-900 mt-6">
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="py-2 px-4 bg-slate-900 hover:bg-slate-800 border border-slate-800 text-xs font-bold rounded-lg transition-colors text-slate-400 hover:text-slate-200"
                                >
                                    Cancel
                                </button>
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="py-2 px-4 text-xs font-bold text-white rounded-lg btn-gradient"
                                >
                                    {loading ? "Saving..." : "Change Password"}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // =========================================================================
        // LOADER & LOADER HELPERS
        // =========================================================================
        function Loader() {
            return (
                <div className="h-[60vh] flex flex-col justify-center items-center space-y-4">
                    <svg className="animate-spin h-10 w-10 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span className="text-sm font-semibold text-slate-400">Loading details from server database...</span>
                </div>
            );
        }

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>

    <!-- Manually compile and execute JSX to handle any compilation/runtime errors cleanly -->
    <script>
        try {
            const src = document.getElementById("react-src").textContent;
            const compiled = Babel.transform(src, {
                presets: [
                    ["react", { runtime: "classic" }]
                ]
            }).code;
            const script = document.createElement("script");
            script.text = compiled;
            document.body.appendChild(script);
        } catch (err) {
            console.error("React/Babel Compiling Error:", err);
            const rootEl = document.getElementById("root");
            if (rootEl) {
                rootEl.innerHTML = `
                    <div style="padding: 24px; color: #f87171; background: rgba(127, 29, 29, 0.4); border: 1px solid rgba(248, 113, 113, 0.2); backdrop-filter: blur(12px); border-radius: 12px; margin: 40px auto; max-width: 600px; font-family: sans-serif; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);">
                        <h3 style="margin-top: 0; color: #fca5a5; font-size: 1.25rem;">React Application Compilation Error</h3>
                        <p style="font-size: 0.875rem; color: #fecaca; margin-bottom: 12px;">The browser-side Babel compiler failed to transpile the React JSX source code:</p>
                        <pre style="white-space: pre-wrap; margin: 0; padding: 12px; background: #0f172a; border-radius: 8px; font-size: 0.75rem; font-family: monospace; color: #e2e8f0; border: 1px solid #334155; line-height: 1.5; max-height: 300px; overflow-y: auto;">${err.message}</pre>
                        <div style="margin-top: 16px; font-size: 0.75rem; color: #94a3b8;">Please verify the browser console for complete diagnostic stack traces.</div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
