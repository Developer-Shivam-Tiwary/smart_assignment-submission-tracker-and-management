# ================================================================
# SMART ASSIGNMENT SUBMISSION & TRACKING SYSTEM
# Database Configuration Properties
# Location: src/main/resources/database.properties
# ================================================================

# ----------------------------------------------------------------
# DRIVER CLASS
# MySQL Connector/J 8.x uses com.mysql.cj.jdbc.Driver
# (Legacy com.mysql.jdbc.Driver is deprecated)
# ----------------------------------------------------------------
db.driver=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------------------
# CONNECTION URL
# jdbc:mysql://HOST:PORT/DATABASE_NAME?parameters
#
# Parameters explained:
#   useSSL=false              → disable SSL for local dev
#   serverTimezone=Asia/Kolkata → IST timezone (change as needed)
#   useUnicode=true           → support Unicode characters
#   characterEncoding=UTF-8   → UTF-8 encoding for all text
#   allowPublicKeyRetrieval=true → required for MySQL 8 caching_sha2
#   autoReconnect=true        → reconnect on connection drop
# ----------------------------------------------------------------
db.url=jdbc:mysql://localhost:3306/smart_assignment_db?useSSL=false&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&autoReconnect=true

# ----------------------------------------------------------------
# CREDENTIALS
# Change these to match your MySQL installation
# ----------------------------------------------------------------
db.username=root
db.password=shivam333@

# ----------------------------------------------------------------
# CONNECTION POOL SETTINGS
# Used by DBConnection.java for managing connection lifecycle
# ----------------------------------------------------------------

# Maximum number of connections in the pool
db.pool.maxSize=20

# Minimum idle connections kept alive
db.pool.minIdle=5

# Maximum time (ms) to wait for a connection from pool
db.pool.connectionTimeout=30000

# Maximum lifetime (ms) of a connection in the pool (30 minutes)
db.pool.maxLifetime=1800000

# Interval (ms) to test idle connections for validity (10 minutes)
db.pool.idleTimeout=600000

# Connection validation query
db.pool.validationQuery=SELECT 1

# ----------------------------------------------------------------
# APPLICATION-LEVEL SETTINGS
# ----------------------------------------------------------------

# Maximum file upload size in bytes (10 MB)
app.upload.maxFileSizeBytes=10485760

# Re-upload window in minutes (Business Rule: 30 minutes)
app.submission.reUploadWindowMinutes=30

# Allowed file extensions (comma-separated, lowercase)
app.upload.allowedExtensions=pdf,docx,jpg,jpeg,png

# Upload directory name (relative to webapp root)
app.upload.assignmentDir=uploads/assignments
app.upload.submissionDir=uploads/submissions

# Application timezone
app.timezone=Asia/Kolkata

# Default pagination page size
app.pagination.pageSize=10

# ----------------------------------------------------------------
# LOGGING SETTINGS
# ----------------------------------------------------------------
app.log.level=INFO
app.log.sqlQueries=false